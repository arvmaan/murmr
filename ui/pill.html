<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>murmr recording</title>
  <link rel="stylesheet" href="pill.css">
</head>
<body>
  <!-- The pill: flat black top blends with the notch, rounded bottom flares out -->
  <div id="pill" class="pill state-recording">
    <span class="dot"></span>
    <div class="wave" id="wave">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
    <span class="timer" id="timer">0:00</span>
    <span class="spinner" id="spinner"></span>
    <span class="label" id="label">Transcribing…</span>
  </div>
  <script src="pill.js"></script>
</body>
</html>
